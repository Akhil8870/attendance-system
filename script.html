<!DOCTYPE html>
<html>
<head>
  <title>Attendance System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📚 Attendance Management System</h1>

<div class="container">

  <div class="card">
    <h2>🔐 Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div class="card">
    <h2>📝 Register</h2>
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" placeholder="Password">
    <button onclick="register()">Register</button>
  </div>

  <div class="card">
    <h2>🎓 Student Dashboard</h2>
    <input id="studentEmail" placeholder="Enter your email">
    <button onclick="getAttendance()">Check Attendance</button>
    <p id="result"></p>
  </div>

  <div class="card">
    <h2>👨‍🏫 Teacher Panel</h2>
    <input id="markEmail" placeholder="Student Email">
    <select id="status">
      <option value="true">Present</option>
      <option value="false">Absent</option>
    </select>
    <button onclick="markAttendance()">Mark Attendance</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
